name: web-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      contracts_version:
        description: '@opensoha/contracts npm version to consume'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CONTRACTS_VERSION: ${{ inputs.contracts_version || '0.1.0' }}
    steps:
      - name: Checkout web
        uses: actions/checkout@v7
        with:
          path: soha-web
      - name: Checkout contracts
        uses: actions/checkout@v7
        with:
          repository: opensoha/soha-contracts
          path: soha-contracts
          token: ${{ secrets.OPENSOHA_CI_TOKEN || github.token }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: soha-web/package-lock.json
      - name: Install release dependencies
        working-directory: soha-web
        run: |
          set -euo pipefail
          npm pkg set "dependencies.@opensoha/contracts=${CONTRACTS_VERSION}"
          npm install --no-audit --no-fund
          node -e "const pkg=require('./package.json'); const lock=require('./package-lock.json'); const dep=pkg.dependencies['@opensoha/contracts']; const entry=lock.packages['node_modules/@opensoha/contracts']; if (dep !== process.env.CONTRACTS_VERSION) throw new Error('contracts dependency is not pinned to release version'); if (!entry || entry.version !== process.env.CONTRACTS_VERSION) throw new Error('contracts lock entry does not match release version'); if (String(entry.resolved || '').startsWith('file:')) throw new Error('contracts release dependency resolved from local file path');"
      - name: Lint
        working-directory: soha-web
        run: npm run lint
      - name: Format check
        working-directory: soha-web
        run: npm run format:check
      - name: Test
        working-directory: soha-web
        run: npm test
      - name: Coverage
        working-directory: soha-web
        run: npm run test:coverage
      - name: Build
        working-directory: soha-web
        run: npm run build
      - name: Package dist
        working-directory: soha-web
        run: |
          asset="soha-web-dist-${GITHUB_REF_NAME}.tar.gz"
          test -f dist/index.html
          tar -C dist -czf "../${asset}" .
          cd ..
          sha256sum "${asset}" > "${asset}.sha256"
          sha256sum -c "${asset}.sha256"
          node soha-web/scripts/verify-release-artifact.mjs --artifact "${asset}"
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: soha-web-dist-${{ github.ref_name }}
          path: |
            soha-web-dist-${{ github.ref_name }}.tar.gz
            soha-web-dist-${{ github.ref_name }}.tar.gz.sha256
          if-no-files-found: error
      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.OPENSOHA_CI_TOKEN || github.token }}
        run: |
          asset="soha-web-dist-${GITHUB_REF_NAME}.tar.gz"
          checksum="${asset}.sha256"
          test -s "${asset}"
          test -s "${checksum}"
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${asset}" "${checksum}" --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${asset}" "${checksum}" --repo "${GITHUB_REPOSITORY}" --title "soha-web ${GITHUB_REF_NAME}" --generate-notes
          fi
      - name: Download published release assets and verify
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.OPENSOHA_CI_TOKEN || github.token }}
        run: |
          set -euo pipefail
          asset="soha-web-dist-${GITHUB_REF_NAME}.tar.gz"
          mkdir -p downloaded-release
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${asset}" \
            --pattern "${asset}.sha256" \
            --dir downloaded-release \
            --clobber
          node soha-web/scripts/verify-release-artifact.mjs --artifact "downloaded-release/${asset}"
