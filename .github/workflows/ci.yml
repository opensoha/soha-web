name: web-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout web
        uses: actions/checkout@v7
        with:
          path: soha-web
      - name: Checkout contracts
        uses: actions/checkout@v7
        with:
          repository: opensoha/soha-contracts
          path: soha-contracts
          token: ${{ secrets.OPENSOHA_CI_TOKEN || github.token }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: soha-web/package-lock.json
      - name: Install
        working-directory: soha-web
        run: npm ci
      - name: Release workflow guard
        working-directory: soha-web
        run: npm run check:release-workflow
      - name: Route architecture guard
        working-directory: soha-web
        run: npm run check:routes
      - name: Frontend boundary guard
        working-directory: soha-web
        run: npm run check:frontend-boundaries
      - name: Lint
        working-directory: soha-web
        run: npm run lint
      - name: Format check
        working-directory: soha-web
        run: npm run format:check
      - name: Typecheck
        working-directory: soha-web
        run: npm run typecheck
      - name: Test
        working-directory: soha-web
        run: npm test
      - name: Coverage
        working-directory: soha-web
        run: npm run test:coverage
      - name: Build
        working-directory: soha-web
        run: npm run build
      - name: Bundle budget
        working-directory: soha-web
        run: npm run check:bundle-budget
      - name: Upload bundle manifest
        uses: actions/upload-artifact@v7
        with:
          name: soha-web-vite-manifest
          path: soha-web/dist/.vite/manifest.json
